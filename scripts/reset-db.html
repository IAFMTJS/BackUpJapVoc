<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Database</title>
    <script>
        // Inline the reset function to avoid module loading issues
        async function resetDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.deleteDatabase('JapaneseVocabularyDB');
                
                request.onerror = (event) => {
                    console.error('Error deleting database:', event);
                    reject(new Error('Failed to delete database'));
                };
                
                request.onsuccess = (event) => {
                    console.log('Database deleted successfully');
                    // Wait a moment before resolving to ensure cleanup is complete
                    setTimeout(resolve, 1000);
                };
            });
        }

        async function performReset() {
            const statusElement = document.getElementById('status');
            try {
                statusElement.textContent = 'Starting database reset...';
                await resetDatabase();
                statusElement.textContent = 'Database reset completed successfully! You can now close this window and refresh your main application.';
                statusElement.style.color = 'green';
            } catch (error) {
                console.error('Reset failed:', error);
                statusElement.textContent = `Error resetting database: ${error.message}`;
                statusElement.style.color = 'red';
            }
        }

        // Start the reset process when the page loads
        window.addEventListener('DOMContentLoaded', performReset);
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }
        #status {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 4px;
            background-color: #f5f5f5;
        }
        .note {
            margin-top: 2rem;
            padding: 1rem;
            border-left: 4px solid #2196f3;
            background-color: #e3f2fd;
        }
    </style>
</head>
<body>
    <h1>Database Reset Tool</h1>
    <div id="status">Initializing reset process...</div>
    <div class="note">
        <strong>Note:</strong> This tool will reset your local database. 
        After the reset is complete, you can close this window and refresh your main application.
        The database will be recreated with the correct schema when you refresh.
    </div>
</body>
</html>
