<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Database</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            line-height: 1.5;
        }
        .status {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 4px;
            background: #f3f4f6;
        }
        .status.error {
            background: #fee2e2;
            color: #dc2626;
        }
        .status.success {
            background: #dcfce7;
            color: #16a34a;
        }
        .note {
            margin: 1rem 0;
            padding: 1rem;
            background: #fef3c7;
            border-radius: 4px;
            color: #92400e;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }
        .progress {
            margin-top: 1rem;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #2563eb;
            width: 0;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>Reset Database</h1>
    <div class="note">
        This tool will delete all local databases and force a clean reinitialization. 
        This may help resolve issues with the application not loading properly.
    </div>
    <button id="resetButton" onclick="resetDatabase()">Reset Database</button>
    <div id="status" class="status"></div>
    <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <script>
        const databases = [
            'JapVocDB',
            'japanese-vocabulary-settings',
            'DictionaryDB',
            'japvoc-romaji-cache'
        ];

        function updateStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status' + (isError ? ' error' : ' success');
        }

        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = `${percent}%`;
        }

        async function resetDatabase() {
            const button = document.getElementById('resetButton');
            button.disabled = true;
            updateStatus('Starting database reset...');
            updateProgress(0);

            let successCount = 0;
            let errorCount = 0;

            for (const dbName of databases) {
                try {
                    updateStatus(`Deleting database: ${dbName}...`);
                    await new Promise((resolve, reject) => {
                        const request = indexedDB.deleteDatabase(dbName);
                        request.onerror = () => reject(new Error(`Failed to delete ${dbName}`));
                        request.onsuccess = () => resolve();
                    });
                    successCount++;
                    updateStatus(`Successfully deleted ${dbName}`);
                } catch (error) {
                    errorCount++;
                    updateStatus(`Error deleting ${dbName}: ${error.message}`, true);
                }
                updateProgress((successCount + errorCount) / databases.length * 100);
            }

            // Clear any remaining IndexedDB connections
            try {
                const databases = await window.indexedDB.databases();
                for (const db of databases) {
                    if (db.name) {
                        try {
                            await new Promise((resolve, reject) => {
                                const request = indexedDB.deleteDatabase(db.name);
                                request.onerror = () => reject(new Error(`Failed to delete ${db.name}`));
                                request.onsuccess = () => resolve();
                            });
                        } catch (error) {
                            console.warn(`Failed to delete ${db.name}:`, error);
                        }
                    }
                }
            } catch (error) {
                console.warn('Error listing databases:', error);
            }

            // Clear other storage
            try {
                localStorage.clear();
                sessionStorage.clear();
                updateStatus('Cleared local and session storage');
            } catch (error) {
                updateStatus('Error clearing storage: ' + error.message, true);
            }

            // Wait a moment to ensure cleanup is complete
            await new Promise(resolve => setTimeout(resolve, 1000));

            if (errorCount === 0) {
                updateStatus('Database reset completed successfully. Please close this window and refresh the main application.');
            } else {
                updateStatus(`Database reset completed with ${errorCount} errors. Some databases may not have been deleted. Please try clearing your browser data manually.`, true);
            }

            button.disabled = false;
        }
    </script>
</body>
</html>
